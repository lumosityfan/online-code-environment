<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Python with WASM</title>
        <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs/loader.min.js"></script>
        <style>
            #editor { width: 100%; height: 500px; border: 1px solid #ccc; }
            #toolbar { display: flex; align-items: center; gap: 4px; background: #2d2d2d; padding: 4px 8px; }
            #toolbar button {
                background: #3c3c3c;
                color: #d4d4d4;
                border: none;
                padding: 4px 10px;
                border-radius: 3px;
                cursor: pointer;
                font-size: 13px;
            }

            #toolbar button:hover {
                background: #505050;
            }

            separator {
                color: #555;
                padding: 0 4px;
                user-select: none;
            }
        </style>
    </head>
    <body>
        <h1>Run Python in the Browser with WASM</h1>
        <div id="toolbar">
            <button onclick="editorAction('undo')">Undo</button>
            <button onclick="editorAction('redo')">Redo</button>
            <separator>|</separator>
            <button onclick="editorAction('cut')">Cut</button>
            <button onclick="editorAction('copy')">Copy</button>
            <button onclick="editorAction('paste')">Paste</button>
            <separator>|</separator>
            <button onclick="runPython()">Run</button>
        </div>
        <div id="editor"></div>
        <pre id="output"></pre>
        <script>
            let editor, pyodide;

            require.config({
                paths: { vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.0/min/vs" }
            });

            require(["vs/editor/editor.main"], function() {
                editor = monaco.editor.create(document.getElementById('editor'), {
                    value: '# Start coding here\n',
                    language: 'python',
                    theme: 'vs-dark',
                    fontSize: 12,
                    tabSize: 4,
                    minimap: { enabled: true },
                    wordWrap: 'on',
                    readOnly: false,
                    automaticLayout: true,
                    scrollBeyondLastLine: false
                });
            });

            // Load Pyodide once on page load, not on every button click
            async function initPyodide() {
                pyodide = await loadPyodide();
            }

            async function runPython() {
                const output = document.getElementById("output");
                
                if (!editor) {
                    output.textContent = "Editor is still loading, please wait...";
                    return;
                }
                if (!pyodide) {
                    output.textContent = "Pyodide is still loading, please wait...";
                    return;
                }

                let pythonCode = editor.getValue();
                
                // Redirect Python's stdout so print() output is captured
                pyodide.runPython(`
                    import sys
                    import io
                    sys.stdout = io.StringIO()
                    sys.stderr = io.StringIO()
                `);

                try {
                    let result = await pyodide.runPythonAsync(pythonCode);

                    // Grab anything written to stdout (e.g. via print())
                    const stdout = pyodide.runPython("sys.stdout.getvalue()");

                    if (stdout) {
                        output.textContent = stdout;
                    } else if (result !== undefined) {
                        // Fall back to the return value of the last expression
                        output.textContent = result;
                    } else {
                        output.textContent = "(no output)";
                    }
                } catch (err) {
                    output.textContent = "Error: " + err.message;
                }
            }

            function editorAction(action) {
                editor.focus();
                switch (action) {
                    case 'undo':
                        editor.trigger('toolbar', 'undo', null);
                        break;
                    case 'redo':
                        editor.trigger('toolbar', 'redo', null);
                        break;
                    case 'cut':
                        editor.trigger('toolbar', 'editor.action.clipboardCutAction', null);
                        break;
                    case 'copy':
                        editor.trigger('toolbar', 'editor.action.clipboardCopyAction', null);
                        break;
                    case 'paste':
                        editor.trigger('toolbar', 'editor.action.clipboardPasteAction', null);
                        break;
                }
            }

            initPyodide();
        </script>
    </body>
</html>
